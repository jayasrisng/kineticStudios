name: Bug report
description: Report reproducible incorrect behavior in Kinetic Studios.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve Kinetic Studios. Please remove sensitive project data before attaching files."
  - type: input
    id: unity-version
    attributes:
      label: Unity version
      description: Include the complete editor version.
      placeholder: 6000.3.17f1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs or media
      description: Attach relevant logs, screenshots, or a short recording.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for a duplicate.
          required: true
        - label: I can reproduce this with a clean checkout where applicable.
          required: true
