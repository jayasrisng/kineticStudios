name: Feature request
description: Propose a scoped improvement to Kinetic Studios.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow limitation should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the desired behavior without prescribing implementation unless necessary.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      multiple: true
      options:
        - Artist or designer
        - Researcher or engineer
        - Educator or student
        - Contributor or maintainer
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and roadmap items.
          required: true
        - label: This request describes one coherent outcome.
          required: true
